<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Flood Relief Management System</h1>
        
        <!-- Registration Form -->
        <div class="card mb-4">
            <div class="card-header">Register Affected Individual</div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" required>
                    </div>
                    <div class="mb-3">
                        <label for="needs" class="form-label">Needs</label>
                        <input type="text" class="form-control" id="needs" placeholder="Food, Shelter, Medical" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>

        <!-- Registered Individuals Table -->
        <div class="card">
            <div class="card-header">Affected Individuals</div>
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Location</th>
                            <th>Needs</th>
                        </tr>
                    </thead>
                    <tbody id="individualsTable">
                        <!-- Data will appear here -->
                        <tr>
                            <td>John Doe</td>
                            <td>35</td>
                            <td>Colombo</td>
                            <td>Food, Shelter</td>
                        </tr>
                        <tr>
                            <td>Jane Smith</td>
                            <td>28</td>
                            <td>Kandy</td>
                            <td>Medical</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Simple JS to handle form submission -->
    <script>
        const form = document.getElementById('registerForm');
        const table = document.getElementById('individualsTable');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const location = document.getElementById('location').value;
            const needs = document.getElementById('needs').value;

            const row = `<tr>
                            <td>${name}</td>
                            <td>${age}</td>
                            <td>${location}</td>
                            <td>${needs}</td>
                        </tr>`;

            table.innerHTML += row;
            form.reset();
        });
    </script>
</body>
</html>
